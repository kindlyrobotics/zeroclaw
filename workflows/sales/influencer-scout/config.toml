# Influencer Scout Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 20
max_history_messages = 50

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[cron]
enabled = true

[browser]
enabled = true
allowed_domains = [
    # "instagram.com",
    # "tiktok.com",
    # "youtube.com",
    # "twitter.com",
]

[http_request]
enabled = true
allowed_domains = []

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "YOUR_EMAIL"
password = "YOUR_APP_PASSWORD"
from_address = "YOUR_EMAIL"
allowed_senders = ["*"]

[agents.instagram_scout]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You specialize in finding and analyzing Instagram influencers. Focus on engagement rate, content quality, and audience authenticity."

[agents.youtube_scout]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You specialize in finding and analyzing YouTube creators. Focus on view counts, subscriber growth, and content relevance."

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 60

[cost]
enabled = true
daily_limit_usd = 12.0
monthly_limit_usd = 180.0
