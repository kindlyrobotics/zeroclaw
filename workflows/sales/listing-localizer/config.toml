# Listing Localizer Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 20

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[browser]
enabled = true
allowed_domains = [
    # "amazon.de",
    # "amazon.co.jp",
    # "mercadolibre.com",
]

[http_request]
enabled = true
allowed_domains = []

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "YOUR_EMAIL"
password = "YOUR_APP_PASSWORD"
from_address = "YOUR_EMAIL"
allowed_senders = ["*"]

[agents.de_localizer]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You localize product listings for the German market. Translate naturally, adapt measurements to metric, and optimize keywords for German Amazon search."

[agents.jp_localizer]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You localize product listings for the Japanese market. Translate naturally, adapt sizing to Japanese conventions, and optimize for Rakuten/Amazon JP search."

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 40

[cost]
enabled = true
daily_limit_usd = 12.0
monthly_limit_usd = 200.0
