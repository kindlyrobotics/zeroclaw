# Churn Predictor Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 20

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[cron]
enabled = true

[http_request]
enabled = true
allowed_domains = []
timeout_secs = 30

[browser]
enabled = true
allowed_domains = []

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "YOUR_EMAIL"
password = "YOUR_APP_PASSWORD"
from_address = "YOUR_EMAIL"
allowed_senders = ["*"]

[agents.analyst]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You analyze customer usage data and calculate churn risk scores. Focus on login frequency, feature usage trends, and support ticket patterns."

[agents.outreach]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You craft personalized win-back emails for at-risk customers. Be empathetic, offer value, and include a clear call to action."

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 50

[cost]
enabled = true
daily_limit_usd = 12.0
monthly_limit_usd = 180.0
