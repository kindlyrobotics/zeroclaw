# Freelance Bid Autopilot Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 15

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[cron]
enabled = true

[browser]
enabled = true
allowed_domains = [
    # "upwork.com",
    # "fiverr.com",
    # "freelancer.com",
]

[channels_config.telegram]
bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
allowed_users = ["@your_username"]

[autonomy]
level = "supervised"
workspace_only = true
max_actions_per_hour = 80

[cost]
enabled = true
daily_limit_usd = 8.0
monthly_limit_usd = 100.0
