# PR Review Bot Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 20
max_history_messages = 50

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[cron]
enabled = true

[http_request]
enabled = true
allowed_domains = [
    "api.github.com",
    # "gitlab.com",
]
timeout_secs = 30

[channels_config.discord]
bot_token = "YOUR_DISCORD_BOT_TOKEN"
allowed_users = []

# Or Slack:
# [channels_config.slack]
# bot_token = "YOUR_SLACK_BOT_TOKEN"
# app_token = "YOUR_SLACK_APP_TOKEN"
# channel_id = "YOUR_CHANNEL_ID"
# allowed_users = []

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 50
allowed_commands = ["git", "ls", "cat", "grep", "find", "wc", "head", "tail", "diff"]

[cost]
enabled = true
daily_limit_usd = 10.0
monthly_limit_usd = 150.0
