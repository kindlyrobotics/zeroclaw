# Dev Agency Bot Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 25
max_history_messages = 100
parallel_tools = true

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[channels_config.telegram]
bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
allowed_users = ["@your_username"]

# Or Discord:
# [channels_config.discord]
# bot_token = "YOUR_DISCORD_BOT_TOKEN"
# allowed_users = []

[agents.frontend]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You are a frontend specialist. Write clean React/Vue/HTML+CSS code. Focus on responsive design and accessibility."

[agents.backend]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You are a backend specialist. Write clean, secure API code. Handle error cases and validation."

[agents.tester]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You are a QA engineer. Write comprehensive tests and identify edge cases."

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 100
allowed_commands = ["git", "npm", "cargo", "node", "python", "pip", "ls", "cat", "grep", "find", "mkdir", "cp", "mv"]

[cost]
enabled = true
daily_limit_usd = 25.0
monthly_limit_usd = 500.0
