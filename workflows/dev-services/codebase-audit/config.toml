# Codebase Audit Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 30
max_history_messages = 50

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "YOUR_EMAIL"
password = "YOUR_APP_PASSWORD"
from_address = "YOUR_EMAIL"
allowed_senders = ["*"]

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 100
allowed_commands = ["git", "ls", "cat", "grep", "find", "wc", "head", "tail", "npm", "cargo", "python"]

[cost]
enabled = true
daily_limit_usd = 20.0
monthly_limit_usd = 300.0
