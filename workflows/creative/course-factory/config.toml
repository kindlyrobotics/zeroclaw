# Course Factory Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 30
max_history_messages = 100

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[browser]
enabled = true
allowed_domains = []

[http_request]
enabled = true
allowed_domains = []
timeout_secs = 30

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "YOUR_EMAIL"
password = "YOUR_APP_PASSWORD"
from_address = "YOUR_EMAIL"
allowed_senders = ["*"]

[agents.researcher]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You are a subject matter researcher. Gather comprehensive, accurate information from authoritative sources. Cite everything."

[agents.quiz_maker]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You create educational assessments. Design quizzes that test understanding, not memorization. Include varied question types."

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 60

[cost]
enabled = true
daily_limit_usd = 20.0
monthly_limit_usd = 300.0
