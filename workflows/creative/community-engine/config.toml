# Community Engine Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 15
max_history_messages = 100

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true
conversation_retention_days = 180

[cron]
enabled = true

[channels_config.discord]
bot_token = "YOUR_DISCORD_BOT_TOKEN"
allowed_users = []
listen_to_bots = false

# Or Telegram:
# [channels_config.telegram]
# bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
# allowed_users = ["*"]

[agents.moderator]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You are a community moderator. Detect spam, scams, and rule violations. Be fair and transparent in enforcement."

[agents.engagement]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You create engaging community activities: polls, challenges, discussion prompts, and AMAs. Keep things fun and inclusive."

[cost]
enabled = true
daily_limit_usd = 10.0
monthly_limit_usd = 150.0
