# Outbound Prospecting Workflow
# Merge these sections into ~/.zeroclaw/config.toml

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 15
max_history_messages = 50

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[cron]
enabled = true

[browser]
enabled = true
allowed_domains = [
    # Add your target sites here
    # "linkedin.com",
    # "crunchbase.com",
    # "yellowpages.com",
]

[http_request]
enabled = true
allowed_domains = []
timeout_secs = 30

[autonomy]
level = "full"
workspace_only = true
max_actions_per_hour = 50

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "YOUR_EMAIL"
password = "YOUR_APP_PASSWORD"
from_address = "YOUR_EMAIL"
allowed_senders = ["*"]
poll_interval_secs = 120

[cost]
enabled = true
daily_limit_usd = 15.0
monthly_limit_usd = 200.0
