# Smart Environment Workflow
# Designed for Raspberry Pi deployment

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 15

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true

[cron]
enabled = true

[heartbeat]
enabled = true
interval_minutes = 15

[channels_config.telegram]
bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
allowed_users = ["@your_username"]

[autonomy]
level = "full"
workspace_only = false
max_actions_per_hour = 200
allowed_commands = ["gpio", "i2cdetect", "i2cget", "i2cset", "python3", "cat", "ls", "vcgencmd"]

# Peripheral configuration — customize for your hardware
# Board type and pin mappings are set here
# See docs/hardware-peripherals-design.md for details

[cost]
enabled = true
daily_limit_usd = 5.0
monthly_limit_usd = 50.0
