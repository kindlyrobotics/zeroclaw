# Support Agent Workflow

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_API_KEY"

[agent]
max_tool_iterations = 15
max_history_messages = 100

[identity]
format = "openclaw"

[memory]
backend = "sqlite"
auto_save = true
conversation_retention_days = 90

# Enable channels as needed:
[channels_config.telegram]
bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
allowed_users = ["*"]

# [channels_config.discord]
# bot_token = "YOUR_DISCORD_BOT_TOKEN"
# allowed_users = []

# [channels_config.whatsapp]
# access_token = "YOUR_WHATSAPP_TOKEN"
# phone_number_id = "YOUR_PHONE_NUMBER_ID"
# verify_token = "YOUR_VERIFY_TOKEN"
# allowed_numbers = ["*"]

# [channels_config.email]
# imap_host = "imap.gmail.com"
# smtp_host = "smtp.gmail.com"
# username = "support@yourdomain.com"
# password = "YOUR_APP_PASSWORD"
# from_address = "support@yourdomain.com"
# allowed_senders = ["*"]

[agents.escalation]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
system_prompt = "You handle escalated support tickets. Compile the issue details, conversation history, and attempted solutions into a clear escalation report."

[cost]
enabled = true
daily_limit_usd = 15.0
monthly_limit_usd = 300.0
