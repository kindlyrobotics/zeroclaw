# ZeroClaw Workflow Base Configuration
# Copy sections you need into ~/.zeroclaw/config.toml
# Lines starting with # are comments — read them before deploying

# ── Provider ──────────────────────────────────────────────
# Change to your preferred provider and model
default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
api_key = "YOUR_OPENROUTER_API_KEY"

# ── Agent Behavior ────────────────────────────────────────
[agent]
max_tool_iterations = 10          # Max tool calls per turn
max_history_messages = 50         # Conversation context window

# ── Identity ──────────────────────────────────────────────
# Point to your workflow's identity.md
[identity]
format = "openclaw"               # Uses identity.md in workspace root

# ── Memory ────────────────────────────────────────────────
[memory]
backend = "sqlite"                # sqlite | markdown | none
auto_save = true
conversation_retention_days = 30

# ── Cron ──────────────────────────────────────────────────
# Enables the scheduler. Jobs are added via CLI:
#   zeroclaw cron add '0 9 * * *' 'agent -m "Run daily task"'
[cron]
enabled = true
max_run_history = 50

# ── Heartbeat ─────────────────────────────────────────────
# Enable for workflows with HEARTBEAT.md
[heartbeat]
enabled = false                   # Set true if workflow includes HEARTBEAT.md
interval_minutes = 30

# ── Gateway ───────────────────────────────────────────────
[gateway]
port = 8080
host = "127.0.0.1"

# ── Autonomy (Tool Permissions) ──────────────────────────
[autonomy]
level = "supervised"              # Change to "full" for unattended operation
workspace_only = true
max_actions_per_hour = 20

# ── Browser ───────────────────────────────────────────────
[browser]
enabled = false                   # Enable for workflows needing web scraping
allowed_domains = []              # Restrict to specific domains

# ── HTTP Requests ─────────────────────────────────────────
[http_request]
enabled = false                   # Enable for API-calling workflows
allowed_domains = []
timeout_secs = 30

# ── Cost Tracking ─────────────────────────────────────────
[cost]
enabled = true
daily_limit_usd = 10.0
monthly_limit_usd = 100.0
warn_at_percent = 80

# ── Channels ─────────────────────────────────────────────
# Uncomment and configure the channels your workflow needs
#
# [channels_config.telegram]
# bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
# allowed_users = ["@your_username"]
#
# [channels_config.discord]
# bot_token = "YOUR_DISCORD_BOT_TOKEN"
# allowed_users = []
#
# [channels_config.email]
# imap_host = "imap.gmail.com"
# smtp_host = "smtp.gmail.com"
# username = "your@email.com"
# password = "YOUR_APP_PASSWORD"
# from_address = "your@email.com"
# allowed_senders = ["*"]
#
# [channels_config.whatsapp]
# access_token = "YOUR_WHATSAPP_TOKEN"
# phone_number_id = "YOUR_PHONE_NUMBER_ID"
# verify_token = "YOUR_VERIFY_TOKEN"
# allowed_numbers = ["+15551234567"]
#
# [channels_config.webhook]
# port = 8080
# secret = "YOUR_WEBHOOK_SECRET"

